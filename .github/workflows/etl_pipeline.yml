name: ETL Indicadores Brasil

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Executar pipeline via Edge Function
        run: |
          echo "Invocando pipeline..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "x-pipeline-secret: ${{ secrets.PIPELINE_SECRET }}" \
            "https://ftbtqqwahzpzwqizigcd.supabase.co/functions/v1/run-pipeline")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "HTTP: $HTTP_CODE"
          echo "$BODY" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          print('Success:', d.get('success'))
          print('Bronze rows:', d.get('bronzeRows'))
          print('BCB ok:', d.get('bcbOk'))
          for line in d.get('log', []):
              print(' ', line)
          " 2>/dev/null || echo "$BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Pipeline falhou! HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Resumo
        if: always()
        run: echo "Pipeline finalizado $(date -u '+%Y-%m-%d %H:%M UTC')"
