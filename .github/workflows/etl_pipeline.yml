name: ETL Indicadores Brasil

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Deps
        run: pip install requests psycopg2-binary loguru

      - name: BRONZE
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          python pipeline/scripts/ingest_bronze.py > /tmp/bronze.txt 2>&1
          cat /tmp/bronze.txt
          exit $(python pipeline/scripts/ingest_bronze.py 2>&1 | tail -1 | grep -c 'Error' || true)

      - name: Log Bronze
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bronze-log
          path: /tmp/bronze.txt
          retention-days: 1

      - name: Resumo
        if: always()
        run: echo done
